<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Learning System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="login-body">
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="brand-center">
                    <div class="brand">
                        <img src="{{ url_for('static', filename='logo.svg') }}" alt="SVGV Student Learning System Logo">
                        <div class="brand-text">
                            <span class="brand-title">SVGV Matriculation Higher Secondary School</span>
                        </div>
                    </div>
                </div>
                <h2>Welcome Back</h2>
                <p>Please enter your details to sign in.</p>
            </div>

            <form id="loginForm" class="form-section">
                <div class="input-group active">
                    <label for="loginEmail">Email or school ID</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="text" id="loginEmail" name="email" autocomplete="username"
                            placeholder="e.g. admin123@gmail.com" required>
                    </div>
                    <br>
                    <label for="loginPassword">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" name="password" autocomplete="current-password"
                            placeholder="Demo admin: admin or admin1" required>
                    </div>
                </div>

                <button type="submit" class="primary-btn">Sign In</button>

                <div id="loginMessage" class="message"></div>
            </form>

            <div class="login-footer">
                <p>&copy; 2026 Student Learning System</p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
